<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">ironmesh mark</title>
  <desc id="desc">A geometric mesh icon with connected nodes in a steel and teal palette.</desc>
  <defs>
    <linearGradient id="panel" x1="36" y1="28" x2="214" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#112523"/>
      <stop offset="0.52" stop-color="#163f3a"/>
      <stop offset="1" stop-color="#0d6b5c"/>
    </linearGradient>
    <linearGradient id="mesh" x1="72" y1="68" x2="184" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9fff4"/>
      <stop offset="0.45" stop-color="#74e4c8"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(84 72) rotate(45) scale(154 132)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74e4c8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#74e4c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0b1615" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="200" height="200" rx="54" fill="url(#panel)" filter="url(#soft-shadow)"/>
  <rect x="28" y="28" width="200" height="200" rx="54" fill="url(#glow)"/>
  <rect x="28.75" y="28.75" width="198.5" height="198.5" rx="53.25" fill="none" stroke="#d9fff4" stroke-opacity="0.18"/>

  <g fill="none" stroke="url(#mesh)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M128 68 L176 96 L176 160 L128 188 L80 160 L80 96 Z"/>
    <path d="M128 68 L128 188"/>
    <path d="M80 96 L176 160"/>
    <path d="M176 96 L80 160"/>
    <path d="M80 96 L176 96"/>
    <path d="M80 160 L176 160"/>
  </g>

  <g fill="#effff9">
    <circle cx="128" cy="68" r="10"/>
    <circle cx="176" cy="96" r="10"/>
    <circle cx="176" cy="160" r="10"/>
    <circle cx="128" cy="188" r="10"/>
    <circle cx="80" cy="160" r="10"/>
    <circle cx="80" cy="96" r="10"/>
    <circle cx="128" cy="128" r="12" fill="#14b8a6"/>
  </g>

  <g fill="#0d3d37">
    <circle cx="128" cy="68" r="4"/>
    <circle cx="176" cy="96" r="4"/>
    <circle cx="176" cy="160" r="4"/>
    <circle cx="128" cy="188" r="4"/>
    <circle cx="80" cy="160" r="4"/>
    <circle cx="80" cy="96" r="4"/>
    <circle cx="128" cy="128" r="4" fill="#e9fff8"/>
  </g>
