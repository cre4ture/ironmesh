<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      try {
        const storageKey = "ironmesh-color-scheme";
        const accentStorageKey = "ironmesh-accent-color";
        const storedColorScheme = window.localStorage.getItem(storageKey);
        const storedAccent = window.localStorage.getItem(accentStorageKey);
        const colorScheme =
          storedColorScheme === "light" || storedColorScheme === "dark" || storedColorScheme === "auto"
            ? storedColorScheme
            : "auto";
        const computedColorScheme =
          colorScheme === "auto"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : colorScheme;
        document.documentElement.setAttribute("data-mantine-color-scheme", computedColorScheme);

        const normalizedAccent = /^#?([\da-f]{6})$/i.test(storedAccent ?? "")
          ? `#${storedAccent.replace(/^#/, "").toLowerCase()}`
          : /^#?([\da-f]{3})$/i.test(storedAccent ?? "")
            ? `#${storedAccent
                .replace(/^#/, "")
                .split("")
                .map((channel) => `${channel}${channel}`)
                .join("")
                .toLowerCase()}`
            : "#14b8a6";
        const red = Number.parseInt(normalizedAccent.slice(1, 3), 16);
        const green = Number.parseInt(normalizedAccent.slice(3, 5), 16);
        const blue = Number.parseInt(normalizedAccent.slice(5, 7), 16);
        const mixChannel = (value, target, amount) => Math.round(value + (target - value) * amount);
        const toRgb = (r, g, b) => `${r}, ${g}, ${b}`;
        document.documentElement.style.setProperty("--ironmesh-accent-rgb", toRgb(red, green, blue));
        document.documentElement.style.setProperty(
          "--ironmesh-accent-soft-rgb",
          toRgb(mixChannel(red, 255, 0.52), mixChannel(green, 255, 0.52), mixChannel(blue, 255, 0.52))
        );
      } catch {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/ironmesh-favicon.svg" />
    <title>ironmesh Client UI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
