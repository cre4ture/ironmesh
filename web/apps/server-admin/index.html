<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      try {
        const storageKey = "ironmesh-color-scheme";
        const provisioningThemeRestoreKey = "ironmesh-provisioning-theme-restore";
        const provisioningThemeActiveKey = "ironmesh-provisioning-theme-active";
        const provisioningThemeRestoreValue = window.sessionStorage.getItem(provisioningThemeRestoreKey);
        const hasProvisioningThemeOverride = window.sessionStorage.getItem(provisioningThemeActiveKey) === "1";

        if (hasProvisioningThemeOverride) {
          if (
            provisioningThemeRestoreValue === "light" ||
            provisioningThemeRestoreValue === "dark" ||
            provisioningThemeRestoreValue === "auto"
          ) {
            window.localStorage.setItem(storageKey, provisioningThemeRestoreValue);
          } else {
            window.localStorage.removeItem(storageKey);
          }

          window.sessionStorage.removeItem(provisioningThemeActiveKey);
          window.sessionStorage.removeItem(provisioningThemeRestoreKey);
        }

        const storedColorScheme = window.localStorage.getItem(storageKey);
        const colorScheme =
          storedColorScheme === "light" || storedColorScheme === "dark" || storedColorScheme === "auto"
            ? storedColorScheme
            : "auto";
        const computedColorScheme =
          colorScheme === "auto"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : colorScheme;
        document.documentElement.setAttribute("data-mantine-color-scheme", computedColorScheme);
      } catch {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/ironmesh-favicon.svg" />
    <title>ironmesh Server Admin</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
