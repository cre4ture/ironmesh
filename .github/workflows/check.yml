name: Workspace Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace check
        run: cargo check --workspace

  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    needs: workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    needs: workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace

  web-smoke-tests:
    name: Web Smoke (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    needs: workspace-check
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: client-ui
            command: pnpm test:e2e:client-ui
          - name: server-admin
            command: pnpm test:e2e:server-admin
          - name: server-admin-rust
            command: pnpm test:e2e:server-admin-rust
          - name: server-admin-setup-rust
            command: pnpm test:e2e:server-admin-setup-rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web smoke suite
        working-directory: web
        run: ${{ matrix.suite.command }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-${{ matrix.suite.name }}-artifacts
          path: |
            web/test-results
            web/playwright-report
          if-no-files-found: ignore

  android-build:
    runs-on: ubuntu-latest
    needs: workspace-check
    env:
      IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 }}
      IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_PASSWORD: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_PASSWORD }}
      IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_ALIAS: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_ALIAS }}
      IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_PASSWORD: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (side by side)
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Verify Android native toolchain
        run: |
          cargo --version
          cargo ndk --version
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_SDK_ROOT/ndk"

      - name: Restore Android debug keystore
        run: |
          mkdir -p $HOME/.android
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > $HOME/.android/debug.keystore
          chmod 600 $HOME/.android/debug.keystore

      - name: Restore Android internal release keystore
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        run: |
          mkdir -p $HOME/.android
          printf '%s' "$IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64" | base64 --decode > $HOME/.android/ironmesh-internal-release.keystore
          chmod 600 $HOME/.android/ironmesh-internal-release.keystore
          echo "IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_FILE=$HOME/.android/ironmesh-internal-release.keystore" >> $GITHUB_ENV

      - name: Run Android JVM unit tests
        working-directory: apps/android-app
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Build Android app
        working-directory: apps/android-app
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Android signed internal release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        working-directory: apps/android-app
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload Android release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-performance-apk
          path: apps/android-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Run Android server-node JVM unit tests
        working-directory: apps/android-server-node-app
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Build Android server-node app
        working-directory: apps/android-server-node-app
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload Android server-node debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-server-node-debug-apk
          path: apps/android-server-node-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Android server-node signed internal release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        working-directory: apps/android-server-node-app
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload Android server-node release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-server-node-release-performance-apk
          path: apps/android-server-node-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  android-instrumentation-tests:
    runs-on: ubuntu-latest
    needs: workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (side by side)
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Restore Android keystore
        run: |
          mkdir -p $HOME/.android
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > $HOME/.android/debug.keystore
          chmod 600 $HOME/.android/debug.keystore

      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: apps/android-app/gradlew --no-daemon -p apps/android-app :app:connectedDebugAndroidTest

  fuse-mount-build:
    runs-on: ubuntu-latest
    needs: workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install FUSE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev pkg-config

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Linux FUSE mount binary
        run: cargo build -p os-integration --bin ironmesh-os-integration --release

      - name: Upload Linux FUSE mount binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-fuse-mount-binary-ubuntu
          path: target/release/ironmesh-os-integration
          if-no-files-found: error

  windows-cfapi-check:
    runs-on: windows-latest
    needs: workspace-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check Windows CFAPI adapter crate
        run: cargo check -p adapter-windows-cfapi --all-targets

      - name: Run Windows workspace clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
