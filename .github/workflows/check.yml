name: Workspace Check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  workspace-check:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Run workspace check
        run: cargo check --workspace

  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    needs: workspace-check
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    needs: workspace-check
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Run unit tests
        run: cargo test --workspace

  web-smoke-tests:
    name: Web Smoke (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    needs: workspace-check
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: client-ui
            command: pnpm test:e2e:client-ui
          - name: server-admin
            command: pnpm test:e2e:server-admin
          - name: server-admin-rust
            command: pnpm test:e2e:server-admin-rust
          - name: server-admin-setup-rust
            command: pnpm test:e2e:server-admin-setup-rust
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web smoke suite
        working-directory: web
        run: ${{ matrix.suite.command }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-${{ matrix.suite.name }}-artifacts
          path: |
            web/test-results
            web/playwright-report
          if-no-files-found: ignore

  android-build:
    runs-on: ubuntu-latest
    needs: workspace-check
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 }}
      IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_PASSWORD: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_PASSWORD }}
      IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_ALIAS: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_ALIAS }}
      IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_PASSWORD: ${{ secrets.IRONMESH_ANDROID_INTERNAL_RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Android build metadata
        run: |
          REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE_BRANCH="$(printf '%s' "$REF_NAME" | sed -E 's#[^A-Za-z0-9._-]+#-#g' | sed -E 's/-+/-/g' | sed -E 's/^-+|-+$//g')"
          SAFE_BRANCH="${SAFE_BRANCH:-main}"
          BUILD_SUFFIX="${SAFE_BRANCH}-${GITHUB_SHA:0:8}"
          echo "BUILD_BRANCH=${REF_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_BRANCH_SLUG=${SAFE_BRANCH}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT_SHORT=${GITHUB_SHA:0:8}" >> "$GITHUB_ENV"
          echo "BUILD_NAME_SUFFIX=${BUILD_SUFFIX}" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (side by side)
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Verify Android native toolchain
        run: |
          cargo --version
          cargo ndk --version
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la "$ANDROID_SDK_ROOT/ndk"

      - name: Restore Android debug keystore
        run: |
          mkdir -p $HOME/.android
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > $HOME/.android/debug.keystore
          chmod 600 $HOME/.android/debug.keystore

      - name: Restore Android internal release keystore
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        run: |
          mkdir -p $HOME/.android
          printf '%s' "$IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64" | base64 --decode > $HOME/.android/ironmesh-internal-release.keystore
          chmod 600 $HOME/.android/ironmesh-internal-release.keystore
          echo "IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_FILE=$HOME/.android/ironmesh-internal-release.keystore" >> $GITHUB_ENV

      - name: Run Android JVM unit tests
        working-directory: apps/android-app
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Build Android signed internal release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        working-directory: apps/android-app
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload Android release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-performance-${{ env.BUILD_NAME_SUFFIX }}
          path: apps/android-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Reclaim disk after Android app builds
        run: |
          rm -rf apps/android-app/app/build
          rm -rf apps/android-app/build
          rm -rf apps/android-app/.gradle

      - name: Run Android server-node JVM unit tests
        working-directory: apps/android-server-node-app
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Reclaim disk before Android server-node release build
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        run: |
          rm -rf apps/android-server-node-app/app/build
          rm -rf apps/android-server-node-app/build
          rm -rf apps/android-server-node-app/.gradle

      - name: Build Android server-node signed internal release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        working-directory: apps/android-server-node-app
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload Android server-node release APK for performance testing
        if: ${{ env.IRONMESH_ANDROID_INTERNAL_RELEASE_STORE_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-server-node-release-performance-${{ env.BUILD_NAME_SUFFIX }}
          path: apps/android-server-node-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  ios-build:
    runs-on: macos-latest
    needs: workspace-check
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      IRONMESH_IOS_SIGNING_CERT_B64: ${{ secrets.IRONMESH_IOS_SIGNING_CERT_B64 }}
      IRONMESH_IOS_SIGNING_CERT_PASSWORD: ${{ secrets.IRONMESH_IOS_SIGNING_CERT_PASSWORD }}
      IRONMESH_IOS_APP_PROFILE_B64: ${{ secrets.IRONMESH_IOS_APP_PROFILE_B64 }}
      IRONMESH_IOS_EXTENSION_PROFILE_B64: ${{ secrets.IRONMESH_IOS_EXTENSION_PROFILE_B64 }}
      IRONMESH_IOS_EXPORT_METHOD: ${{ vars.IRONMESH_IOS_EXPORT_METHOD }}
      IOS_APP_SCHEME: IronmeshIosApp
      IOS_ARCHIVE_PATH: ${{ github.workspace }}/.tmp/IronmeshIosApp.xcarchive
      IOS_DERIVED_DATA_PATH: ${{ github.workspace }}/.tmp/ironmesh-ios-derived-data
      IOS_EXPORT_OPTIONS_PATH: ${{ github.workspace }}/.tmp/ironmesh-ios-export-options.plist
      IOS_EXPORT_PATH: ${{ github.workspace }}/.tmp/ironmesh-ios-export
      IOS_PROJECT_PATH: apps/apple-file-provider/IronmeshAppleFileProvider.xcodeproj
      IOS_TEST_SCHEME: IronmeshIosProject
      IOS_XCRESULT_PATH: ${{ github.workspace }}/.tmp/IronmeshIosProject.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare iOS build metadata
        run: |
          REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE_BRANCH="$(printf '%s' "$REF_NAME" | sed -E 's#[^A-Za-z0-9._-]+#-#g' | sed -E 's/-+/-/g' | sed -E 's/^-+|-+$//g')"
          SAFE_BRANCH="${SAFE_BRANCH:-main}"
          BUILD_SUFFIX="${SAFE_BRANCH}-${GITHUB_SHA:0:8}"
          echo "BUILD_BRANCH=${REF_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_BRANCH_SLUG=${SAFE_BRANCH}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT_SHORT=${GITHUB_SHA:0:8}" >> "$GITHUB_ENV"
          echo "BUILD_NAME_SUFFIX=${BUILD_SUFFIX}" >> "$GITHUB_ENV"

      - name: Determine iOS signing mode
        run: |
          if [ -n "$IRONMESH_IOS_SIGNING_CERT_B64" ] && [ -n "$IRONMESH_IOS_SIGNING_CERT_PASSWORD" ] && [ -n "$IRONMESH_IOS_APP_PROFILE_B64" ] && [ -n "$IRONMESH_IOS_EXTENSION_PROFILE_B64" ]; then
            echo "IOS_SIGNED_EXPORT_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "IOS_SIGNED_EXPORT_ENABLED=false" >> "$GITHUB_ENV"
          fi

          EXPORT_METHOD="${IRONMESH_IOS_EXPORT_METHOD:-development}"
          echo "IRONMESH_IOS_EXPORT_METHOD=${EXPORT_METHOD}" >> "$GITHUB_ENV"

      - name: Create iOS temp workspace
        run: mkdir -p "$(dirname "$IOS_ARCHIVE_PATH")"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with Apple targets
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-17
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Run iOS Rust facade tests
        run: cargo test -p ios-app

      - name: Run shared Apple Swift package tests
        working-directory: apps/apple-file-provider
        run: swift test

      - name: Resolve iOS Simulator destination
        run: |
          DESTINATION="$(IRONMESH_IOS_SIMULATOR_APP_BUNDLE_ID=dev.ironmesh.apple.iosapp IRONMESH_IOS_SIMULATOR_RESET=1 apps/apple-file-provider/scripts/prepare-ios-simulator.sh "$IOS_PROJECT_PATH" "$IOS_TEST_SCHEME")"
          echo "IOS_SIMULATOR_DESTINATION=${DESTINATION}" >> "$GITHUB_ENV"

      - name: Run iOS simulator tests
        run: |
          rm -rf "$IOS_XCRESULT_PATH" "$IOS_DERIVED_DATA_PATH"
          xcodebuild test \
            -project "$IOS_PROJECT_PATH" \
            -scheme "$IOS_TEST_SCHEME" \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -destination-timeout 180 \
            -derivedDataPath "$IOS_DERIVED_DATA_PATH" \
            -resultBundlePath "$IOS_XCRESULT_PATH"

      - name: Setup iOS signing assets
        if: env.IOS_SIGNED_EXPORT_ENABLED == 'true'
        run: apps/apple-file-provider/scripts/setup-ios-signing.sh "$GITHUB_ENV"

      - name: Archive iOS release app
        run: |
          rm -rf "$IOS_ARCHIVE_PATH" "$IOS_EXPORT_PATH"
          if [ "$IOS_SIGNED_EXPORT_ENABLED" = "true" ]; then
            xcodebuild archive \
              -project "$IOS_PROJECT_PATH" \
              -scheme "$IOS_APP_SCHEME" \
              -configuration Release \
              -destination "generic/platform=iOS" \
              -derivedDataPath "$IOS_DERIVED_DATA_PATH" \
              -archivePath "$IOS_ARCHIVE_PATH" \
              CODE_SIGN_STYLE=Automatic \
              CODE_SIGN_IDENTITY="$IRONMESH_IOS_SIGNING_IDENTITY" \
              CODE_SIGNING_ALLOWED=YES \
              CODE_SIGNING_REQUIRED=YES \
              DEVELOPMENT_TEAM="$IRONMESH_IOS_DEVELOPMENT_TEAM" \
              OTHER_CODE_SIGN_FLAGS="--keychain $IRONMESH_IOS_KEYCHAIN_PATH"
          else
            xcodebuild archive \
              -project "$IOS_PROJECT_PATH" \
              -scheme "$IOS_APP_SCHEME" \
              -configuration Release \
              -destination "generic/platform=iOS" \
              -derivedDataPath "$IOS_DERIVED_DATA_PATH" \
              -archivePath "$IOS_ARCHIVE_PATH" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          fi

      - name: Verify archived iOS File Provider extension
        run: apps/apple-file-provider/scripts/verify-ios-app-archive.sh "$IOS_ARCHIVE_PATH"

      - name: Write iOS export options
        if: env.IOS_SIGNED_EXPORT_ENABLED == 'true'
        run: |
          cat >"$IOS_EXPORT_OPTIONS_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>compileBitcode</key>
            <false/>
            <key>method</key>
            <string>${IRONMESH_IOS_EXPORT_METHOD}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>dev.ironmesh.apple.iosapp</key>
              <string>${IRONMESH_IOS_APP_PROFILE_UUID}</string>
              <key>dev.ironmesh.apple.iosapp.fileprovider</key>
              <string>${IRONMESH_IOS_EXTENSION_PROFILE_UUID}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${IRONMESH_IOS_DEVELOPMENT_TEAM}</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export signed iOS IPA
        if: env.IOS_SIGNED_EXPORT_ENABLED == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -exportPath "$IOS_EXPORT_PATH" \
            -exportOptionsPlist "$IOS_EXPORT_OPTIONS_PATH" \
            OTHER_CODE_SIGN_FLAGS="--keychain $IRONMESH_IOS_KEYCHAIN_PATH"

      - name: Upload signed iOS IPA for manual installs
        if: env.IOS_SIGNED_EXPORT_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-manual-install-${{ env.BUILD_NAME_SUFFIX }}
          path: |
            ${{ env.IOS_EXPORT_PATH }}/*.ipa
            ${{ env.IOS_ARCHIVE_PATH }}/dSYMs
          if-no-files-found: error

      - name: Upload unsigned iOS release archive
        if: env.IOS_SIGNED_EXPORT_ENABLED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-archive-unsigned-${{ env.BUILD_NAME_SUFFIX }}
          path: ${{ env.IOS_ARCHIVE_PATH }}
          if-no-files-found: error

      - name: Upload iOS diagnostics artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-diagnostics-${{ env.BUILD_NAME_SUFFIX }}
          path: |
            ${{ env.IOS_XCRESULT_PATH }}
            ${{ env.IOS_ARCHIVE_PATH }}
            ${{ env.IOS_EXPORT_PATH }}
          if-no-files-found: ignore

  android-instrumentation-tests:
    runs-on: ubuntu-latest
    needs: workspace-check
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (side by side)
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Restore Android keystore
        run: |
          mkdir -p $HOME/.android
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > $HOME/.android/debug.keystore
          chmod 600 $HOME/.android/debug.keystore

      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # sdkmanager occasionally fetches a corrupted "Android Emulator" package
      # ("Error on ZipFile unknown archive") while android-emulator-runner sets
      # up the AVD; this is a known transient issue with that action and
      # reliably succeeds on retry, so retry the whole step up to twice more
      # before failing the job.
      - name: Run Android instrumentation tests
        id: android_instrumentation_tests_1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: apps/android-app/gradlew --no-daemon -p apps/android-app :app:connectedDebugAndroidTest

      - name: Run Android instrumentation tests (retry 1)
        id: android_instrumentation_tests_2
        if: steps.android_instrumentation_tests_1.outcome == 'failure'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: apps/android-app/gradlew --no-daemon -p apps/android-app :app:connectedDebugAndroidTest

      - name: Run Android instrumentation tests (retry 2)
        id: android_instrumentation_tests_3
        if: steps.android_instrumentation_tests_2.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: apps/android-app/gradlew --no-daemon -p apps/android-app :app:connectedDebugAndroidTest

  fuse-mount-build:
    runs-on: ubuntu-latest
    needs: workspace-check
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install FUSE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev pkg-config

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Build Linux FUSE mount binary
        run: cargo build -p os-integration --bin ironmesh-os-integration --release

      - name: Upload Linux FUSE mount binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-fuse-mount-binary-ubuntu
          path: target/release/ironmesh-os-integration
          if-no-files-found: error

  windows-cfapi-check:
    runs-on: windows-latest
    needs: workspace-check
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Check Windows CFAPI adapter crate
        run: cargo check -p adapter-windows-cfapi --all-targets

      - name: Run Windows workspace clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
