[graph]
# Limit checks to the targets IronMesh actually builds in CI and distribution flows.
# This keeps wasm-only browser relay dependencies from polluting the native/mobile graph.
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
  "aarch64-linux-android",
  "aarch64-apple-ios",
  "aarch64-apple-ios-sim",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
all-features = true

[advisories]
ignore = [
  # Transitive through turso 0.6.0-pre.2 when the optional turso metadata backend is enabled.
  # The upstream crate currently has no maintained replacement or safe upgrade path.
  "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.9
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
